<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>E2EE P2P Mesh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overscroll-behavior: none; }
        .chat-container { scroll-behavior: smooth; }
        .bubble-self { @apply bg-white text-black rounded-br-none shadow-md; }
        .bubble-other { @apply bg-black text-white rounded-bl-none shadow-md border border-white/10; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="bg-black text-white h-full flex flex-col overflow-hidden">

    <header class="bg-black/90 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-4">
            <div id="adminTrigger" class="h-10 w-10 bg-white rounded-xl flex items-center justify-center shadow-lg cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <div>
                <div class="flex items-center gap-2">
                    <h1 class="font-bold text-lg tracking-tight text-white">E2EE P2P Chat</h1>
                    <div id="e2eeStatus" class="flex items-center gap-1 text-[10px] bg-white/10 text-white border border-white/20 px-1.5 py-0.5 rounded opacity-0 transition-opacity duration-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                        ENCRYPTED
                    </div>
                </div>
                <div id="onlineCount" class="text-xs text-white/50 font-medium uppercase tracking-wider">Connecting...</div>
            </div>
        </div>

        <div class="flex items-center gap-4">
             <div class="text-[10px] bg-white/5 px-2 py-1 rounded border border-white/10 font-mono text-white/50 hidden md:block">
                Role: <span id="nodeRole">Leaf</span>
             </div>
             <div id="netStats" class="text-[10px] bg-white/5 px-2 py-1 rounded border border-white/10 font-mono text-white/50 hidden md:block">
                Fanout 6 • RTT -
             </div>
             <button id="voiceBtn" class="p-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition-colors group relative" title="Toggle Voice Chat">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white/60 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path id="voiceIcon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <span id="voiceStatus" class="absolute -top-1 -right-1 flex h-3 w-3 hidden">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
            </button>
            <input
                id="nicknameInput"
                type="text"
                maxlength="20"
                class="bg-black border border-white/10 rounded-md px-3 py-1 text-sm text-white focus:outline-none focus:ring-1 focus:ring-white/40 w-32"
            />
        </div>
    </header>

    <main id="chatWindow" class="flex-1 overflow-y-auto px-6 py-8 space-y-4 custom-scrollbar chat-container" style="overscroll-behavior: contain; -webkit-overflow-scrolling: touch;">
        <div class="flex flex-col items-center justify-center h-full text-white/50 space-y-4" id="emptyState">
            <p class="text-sm font-medium">Securing connection with peers...</p>
        </div>
        <div id="historyLoader" class="hidden sticky top-2 justify-center items-center gap-2 text-xs text-white/70 px-3 py-2 rounded-full bg-white/5 border border-white/10 backdrop-blur">
            <span class="h-2 w-2 rounded-full bg-white/70 animate-pulse"></span>
            <span>Loading older messages...</span>
        </div>
    </main>

    <footer class="bg-black/90 backdrop-blur-xl border-t border-white/10 p-4">
        <form id="chatForm" class="max-w-5xl mx-auto flex gap-3">
            <input type="file" id="fileInput" accept="image/*" class="hidden" />
            <button type="button" id="attachBtn" class="p-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all text-white/60 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </button>
            <input
                id="messageInput"
                autocomplete="off"
                maxlength="500"
                placeholder="Type an encrypted message..."
                class="flex-1 bg-black border border-white/10 rounded-xl px-5 py-3 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-white/40"
            />
            <button type="submit" id="sendBtn" class="bg-white text-black hover:bg-white/90 active:scale-95 transition-all px-8 py-3 rounded-xl font-bold shadow-lg shadow-white/10">
                Send
            </button>
        </form>
    </footer>

    <div id="audioContainer" class="hidden"></div>

<script src="/client.js"></script>
</body>
</html>
